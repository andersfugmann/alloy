<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>History Search</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px;
      color: #202124;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #5f6368;
    }
    .controls label {
      display: flex;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }
    .controls select {
      margin-left: auto;
      padding: 2px 4px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 12px;
      background: #fff;
    }
    .search-box {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
    }
    .search-box:focus {
      border-color: #1a73e8;
      box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
    }
    .results {
      list-style: none;
      margin: 12px 0 0 0;
      padding: 0;
    }
    .results li {
      padding: 8px 4px;
      border-bottom: 1px solid #f1f3f4;
      cursor: pointer;
    }
    .results li:hover {
      background: #f1f3f4;
      border-radius: 4px;
    }
    .results li:last-child { border-bottom: none; }
    .result-title {
      font-weight: 500;
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-url {
      font-size: 11px;
      color: #5f6368;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .result-meta {
      font-size: 11px;
      color: #80868b;
      margin-top: 1px;
    }
    .empty-state {
      color: #5f6368;
      text-align: center;
      padding: 24px 0;
    }
    #status {
      margin-top: 8px;
      font-size: 11px;
      color: #5f6368;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="controls">
    <label><input type="checkbox" id="searchUrls" checked> URLs</label>
    <label><input type="checkbox" id="searchTitles" checked> Titles</label>
    <select id="sortBy">
      <option value="best_match">Best match</option>
      <option value="date">Date</option>
      <option value="frequency">Frequency</option>
    </select>
    <select id="maxAge">
      <option value="1">1 day</option>
      <option value="7">7 days</option>
      <option value="30">30 days</option>
      <option value="90">90 days</option>
      <option value="180">180 days</option>
      <option value="365">365 days</option>
      <option value="" selected>All</option>
    </select>
  </div>
  <input type="text" id="searchInput" class="search-box" placeholder="Search history…" autofocus>
  <ul class="results" id="resultsList"></ul>
  <div id="status"></div>
  <script src="history_panel.js"></script>
</body>
</html>
