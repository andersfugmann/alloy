name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (e.g. 1.0.0)"
        required: true
        type: string
      publish:
        description: "Create GitHub Release with .deb assets"
        required: false
        type: boolean
        default: false

jobs:
  build-debs:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y fakeroot debhelper

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5"

      - name: Prime opam download cache (workaround for upstream outages)
        run: |
          # gitlab.inria.fr (which hosts menhir) occasionally goes into
          # maintenance and serves a stub page. Pre-populate opam's
          # download cache from opam.ocaml.org so the install succeeds
          # without contacting the primary source.
          mkdir -p ~/.opam/download-cache/md5/e9
          curl -sL --retry 3 \
            "https://opam.ocaml.org/cache/md5/e9/e993231085db95ab011ffe0cd606d9dd" \
            -o ~/.opam/download-cache/md5/e9/e993231085db95ab011ffe0cd606d9dd || true

      - name: Install dependencies
        run: |
          opam install . --deps-only
          cd extension && npm ci

      - name: Build Debian packages
        run: opam exec -- make deb VERSION=${{ inputs.version }}

      - name: Upload alloyd deb
        uses: actions/upload-artifact@v4
        with:
          name: alloyd_${{ inputs.version }}_amd64.deb
          path: _build/deb/alloyd_*.deb

      - name: Upload alloy deb
        uses: actions/upload-artifact@v4
        with:
          name: alloy_${{ inputs.version }}_amd64.deb
          path: _build/deb/alloy_*.deb

      - name: Create GitHub Release
        if: inputs.publish
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            _build/deb/alloyd_*.deb \
            _build/deb/alloy_*.deb
